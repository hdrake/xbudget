name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.7.0
        with:
          access_token: ${{ github.token }}
      - name: Checkout source
        uses: actions/checkout@v2

      - name: Conda setup
        uses: conda-incubator/setup-miniconda@v2
        with:
          channels: conda-forge
          mamba-version: '*'
          python-version: ${{ matrix.python-version }}
          activate-environment: test_env_xbudget
          auto-activate-base: false

      - name: Set up conda environment
        run: |
          mamba env update -f ci/environment.yml
          python -m pip install -e .
      - name: Conda list information
        run: |
          conda env list
          conda list
      - name: Test with pytest
        run: |
          pytest

  docs:
    # Read the Docs builds the hosted PR preview; this build is the pre-merge
    # gate. It runs on fork PRs (where RTD may not), and its artifact lets you
    # look at the rendered pages without waiting on RTD. pip-based, mirroring
    # .readthedocs.yaml (conda dropped from the docs build).
    name: docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs toolchain
        # docs/requirements.txt installs Sphinx + Furo + myst-nb and xbudget
        # itself (so autodoc can import it).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build docs
        # Mirrors .readthedocs.yaml: html builder, fail_on_warning. --keep-going
        # reports every warning instead of stopping at the first. Flat docs/ tree.
        run: |
          python -m sphinx -b html -W --keep-going docs docs/_build/html

      - name: Upload rendered docs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-html
          path: docs/_build/html
