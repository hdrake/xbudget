# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# Build the Sphinx docs. Warnings fail the build (matches CI's -W).
sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

# Don't build any extra output formats.
formats: []

# pip-based install (conda dropped): the docs toolchain plus xbudget itself,
# both declared in docs/requirements.txt.
python:
  install:
    - requirements: docs/requirements.txt
