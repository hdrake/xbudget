---
mass: # finite-volume mass budget in units of kg/s
  lambda: "density"
  thickness: "thkcello"
  lhs:
    sum:
      Eulerian_tendency:
        product:
          thickness_tendency: "dhdt"
          density: 1035.
          area: "areacello"
  rhs:
    sum:
      advection:
        sum:
          lateral:
            product:
              thickness_tendency: "dynamics_h_tendency"
              density: 1035.
              area: "areacello"
            sum:
              zonal_convergence:
                product:
                  zonal_divergence:
                    difference:
                      zonal_mass_transport: "umo"
                  sign: -1.
              meridional_convergence:
                product:
                  meridional_divergence:
                    difference:
                      meridional_mass_transport: "vmo"
                  sign: -1.
          interfacial:
            product:
              thickness_tendency: "vert_remap_h_tendency"
              density: 1035.
              area: "areacello"
      surface_exchange_flux:
        product:
          thickness_tendency: "boundary_forcing_h_tendency"
          density: 1035.
          area: "areacello"
        sum:
          rain_and_ice:
            product:
              mass_tendency_per_unit_area: "prlq"
              area: "areacello"
          snow:
            product:
              mass_tendency_per_unit_area: "prsn"
              area: "areacello"
          evaporation:
            product:
              mass_tendency_per_unit_area: "evs"
              area: "areacello"
          rivers:
            product:
              mass_tendency_per_unit_area: "friver"
              area: "areacello"
          icebergs:
            product:
              mass_tendency_per_unit_area: "ficeberg"
              area: "areacello"
          sea_ice_melt:
            product:
              mass_tendency_per_unit_area: "fsitherm"
              area: "areacello"
          virtual_precip_restoring:
            product:
              mass_tendency_per_unit_area: "vprec"
              area: "areacello"

heat: # finite-volume heat budget in units of J/s
  lambda: "thetao"
  surface_lambda: "tos"
  lhs:
    sum:
      Eulerian_tendency:
        product:
          tracer_content_tendency_per_unit_area: "opottemptend"
          area: "areacello"
      advection:
        sum:
          lateral:
            product:
              sign: -1.
              tracer_content_tendency_per_unit_area: "T_advection_xy"
              area: "areacello"
          interfacial:
            product:
              sign: -1.
              tracer_content_tendency_per_unit_area: "Th_tendency_vert_remap"
              area: "areacello"
      surface_ocean_flux_advective_negative_lhs:
        product:
          sign: -1.
          specific_heat_capacity: 3992.
          lambda_mass: "tos"
          thickness_tendency: "boundary_forcing_h_tendency"
          density: 1035.
          area: "areacello"
  rhs:
    sum:
      diffusion:
        sum:
          lateral:
            product:
              tracer_content_tendency_per_unit_area: "opottemppmdiff"
              area: "areacello"
          interfacial:
            product:
              tracer_content_tendency_per_unit_area: "opottempdiff"
              area: "areacello"
            
      surface_exchange_flux:
        product:
          tracer_content_tendency_per_unit_area: "boundary_forcing_heat_tendency"
          area: "areacello"
        sum:
          nonadvective:
            sum:
              # NOTE: this sum mixes 2D and 3D fields — the shortwave term
              # (rsdoabsorb) is 3D while the other terms are 2D — so the summed
              # result is only meaningful where they are reconciled (e.g. after
              # vertically integrating the shortwave absorption).
              latent:
                product:
                  tracer_content_tendency_per_unit_area: "hflso"
                  area: "areacello"
              sensible:
                product:
                  tracer_content_tendency_per_unit_area: "hfsso"
                  area: "areacello"
              longwave:
                product:
                  tracer_content_tendency_per_unit_area: "rlntds"
                  area: "areacello"
              shortwave:
                product:
                  tracer_content_tendency_per_unit_area: "rsdoabsorb"
                  area: "areacello"
                # Alternative (not yet supported): derive the per-layer
                # shortwave heating from the radiative flux `rsdo` via a vertical
                # `difference` along the Z axis, instead of using `rsdoabsorb`.
          advective:
            product:
              tracer_content_tendency_per_unit_area: "heat_content_surfwater"
              area: "areacello"
            #Alternative method:
            #product:
            #  specific_heat_capacity: 3992.
            #  lambda_mass: "tos"
            #  thickness_tendency: "boundary_forcing_h_tendency"
            #  density: 1035.
            #  area: "areacello"
      surface_ocean_flux_advective_negative_rhs:
        product:
          sign: -1.
          specific_heat_capacity: 3992.
          lambda_mass: "tos"
          thickness_tendency: "boundary_forcing_h_tendency"
          density: 1035.
          area: "areacello"
      bottom_flux:
        product:
          tracer_content_tendency_per_unit_area: "internal_heat_heat_tendency"
          area: "areacello"
      frazil_ice:
        product:
          tracer_content_tendency_per_unit_area: "frazil_heat_tendency"
          area: "areacello"

salt: # finite-volume salt budget in units of kg/s
  lambda: "so"
  surface_lambda: "sos"
  lhs:
    sum:
      Eulerian_tendency:
        product:
          tracer_content_tendency_per_unit_area: "osalttend"
          area: "areacello"
      advection:
        sum:
          lateral:
            product:
              sign: -1.
              tracer_content_tendency_per_unit_area: "S_advection_xy"
              area: "areacello"
          interfacial:
            product:
              sign: -1.
              tracer_content_tendency_per_unit_area: "Sh_tendency_vert_remap"
              area: "areacello"
      surface_ocean_flux_advective_negative_lhs:
        product:
          sign: -1.
          unit_conversion: 0.001
          lambda_mass: "sos"
          thickness_tendency: "boundary_forcing_h_tendency"
          density: 1035.
          area: "areacello"
      
  rhs:
    sum:
      diffusion:
        sum:
          lateral:
            product:
              tracer_content_tendency_per_unit_area: "osaltpmdiff"
              area: "areacello"
          interfacial:
            product:
              tracer_content_tendency_per_unit_area: "osaltdiff"
              area: "areacello"
      surface_exchange_flux:
        product:
          tracer_content_tendency_per_unit_area: "boundary_forcing_salt_tendency"
          area: "areacello"
        sum:
          nonadvective:
            sum:
              basal:
                product:
                  tracer_content_tendency_per_unit_area: "sfdsi"
                  area: "areacello"
          advective:
            product:
              unit_conversion: 0.001
              lambda_mass: 0.
              thickness_tendency: "boundary_forcing_h_tendency"
              density: 1035.
              area: "areacello"
      surface_ocean_flux_advective_negative_rhs:
        product:
          sign: -1.
          unit_conversion: 0.001
          lambda_mass: "sos"
          thickness_tendency: "boundary_forcing_h_tendency"
          density: 1035.
          area: "areacello"
