---
mass: # finite-volume mass budget in units of kg/s
  lambda: "density"
  thickness: "thkcello"
  lhs:
    var: null
  rhs:
    sum:
      surface_exchange_flux:
        sum:
          rain_and_ice:
            product:
              mass_tendency_per_unit_area: "prlq"
              area: "areacello"
          snow:
            product:
              mass_tendency_per_unit_area: "prsn"
              area: "areacello"
          evaporation:
            product:
              mass_tendency_per_unit_area: "evs"
              area: "areacello"
          rivers:
            product:
              mass_tendency_per_unit_area: "friver"
              area: "areacello"
          icebergs:
            product:
              mass_tendency_per_unit_area: "ficeberg"
              area: "areacello"
          sea_ice_melt:
            product:
              mass_tendency_per_unit_area: "fsitherm"
              area: "areacello"
          virtual_precip_restoring:
            product:
              mass_tendency_per_unit_area: "vprec"
              area: "areacello"

heat: # finite-volume heat budget in units of J/s
  lambda: "thetao"
  surface_lambda: "tos"
  lhs:
    var: null
  rhs:
    sum:
      surface_exchange_flux:
        sum:
          nonadvective:
            sum:
              latent:
                product:
                  tracer_content_tendency_per_unit_area: "hflso"
                  area: "areacello"
              sensible:
                product:
                  tracer_content_tendency_per_unit_area: "hfsso"
                  area: "areacello"
              longwave:
                product:
                  tracer_content_tendency_per_unit_area: "rlntds"
                  area: "areacello"
              shortwave:
                product:
                  tracer_content_tendency_per_unit_area: "rsntds"
                  area: "areacello"
          advective:
            product:
              specific_heat_capacity: 3992.
              lambda_mass: "tos"
              mass_tendency_per_unit_area: "wfo"
              area: "areacello"
      surface_ocean_flux_advective_negative_rhs:
        product:
          sign: -1.
          specific_heat_capacity: 3992.
          lambda_mass: "tos"
          mass_tendency_per_unit_area: "wfo"
          area: "areacello"

salt: # finite-volume salt budget in units of kg/s
  lambda: "so"
  surface_lambda: "sos"
  lhs:
    var: null
  rhs:
    sum:
      surface_exchange_flux:
        sum:
          nonadvective:
            sum:
              basal:
                product:
                  tracer_content_tendency_per_unit_area: "sfdsi"
                  area: "areacello"
          advective:
            product:
              unit_conversion: 0.001
              lambda_mass: 0.
              mass_tendency_per_unit_area: "wfo"
              area: "areacello"
      surface_ocean_flux_advective_negative_rhs:
        sum:
          rain_and_ice:
            product:
              sign: -1.
              unit_conversion: 0.001
              lambda_mass: "sos"
              mass_tendency_per_unit_area: "prlq"
              area: "areacello"
          snow:
            product:
              sign: -1.
              unit_conversion: 0.001
              lambda_mass: "sos"
              mass_tendency_per_unit_area: "prsn"
              area: "areacello"
          evaporation:
            product:
              sign: -1.
              unit_conversion: 0.001
              lambda_mass: "sos"
              mass_tendency_per_unit_area: "evs"
              area: "areacello"
          rivers:
            product:
              sign: -1.
              unit_conversion: 0.001
              lambda_mass: "sos"
              mass_tendency_per_unit_area: "friver"
              area: "areacello"
          icebergs:
            product:
              sign: -1.
              unit_conversion: 0.001
              lambda_mass: "sos"
              mass_tendency_per_unit_area: "ficeberg"
              area: "areacello"
          sea_ice_melt:
            product:
              sign: -1.
              unit_conversion: 0.001
              lambda_mass: "sos"
              mass_tendency_per_unit_area: "fsitherm"
              area: "areacello"
          virtual_precip_restoring:
            product:
              sign: -1.
              unit_conversion: 0.001
              lambda_mass: "sos"
              mass_tendency_per_unit_area: "vprec"
              area: "areacello"